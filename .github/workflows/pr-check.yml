name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: shellcheck -s bash gai gai-watch install.sh uninstall.sh

  changelog:
    name: changelog updated
    needs: shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Auto-update CHANGELOG if missing
        run: |
          if git diff origin/main...HEAD -- CHANGELOG.md | grep -q '^+'; then
            echo "✅ CHANGELOG.md already updated"
            exit 0
          fi

          echo "Auto-generating CHANGELOG entries from branch commits..."

          ENTRIES=$(git log origin/main..HEAD --pretty=format:"- %s" | grep -v '^- Merge ')

          if [ -z "$ENTRIES" ]; then
            echo "No new commits found — nothing to add."
            exit 0
          fi

          ADDED=""
          FIXED=""
          CHANGED=""

          while IFS= read -r line; do
            msg="${line#- }"
            case "$msg" in
              fix*|Fix*)   FIXED="${FIXED}\n${line}" ;;
              feat*|Feat*) ADDED="${ADDED}\n${line}" ;;
              *)           CHANGED="${CHANGED}\n${line}" ;;
            esac
          done <<< "$ENTRIES"

          BLOCK=""
          if [ -n "$ADDED" ]; then
            BLOCK="${BLOCK}\n### Added\n$(printf '%b' "$ADDED")\n"
          fi
          if [ -n "$FIXED" ]; then
            BLOCK="${BLOCK}\n### Fixed\n$(printf '%b' "$FIXED")\n"
          fi
          if [ -n "$CHANGED" ]; then
            BLOCK="${BLOCK}\n### Changed\n$(printf '%b' "$CHANGED")\n"
          fi

          python3 - <<PYEOF
          import re
          with open("CHANGELOG.md", "r") as f:
              content = f.read()
          block = """$BLOCK"""
          updated = re.sub(
              r'(## \[Unreleased\]\n)',
              r'\1' + block.lstrip('\n') + '\n',
              content,
              count=1
          )
          with open("CHANGELOG.md", "w") as f:
              f.write(updated)
          print("CHANGELOG.md updated")
          PYEOF

      - name: Commit CHANGELOG update
        id: commit
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): auto-update [Unreleased] from PR commits"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Report checks on new commit
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_SHA="${{ steps.commit.outputs.new_sha }}"
          REPO="${{ github.repository }}"
          # shellcheck passed in the prior job — report it as success for the new commit
          gh api "repos/$REPO/check-runs" \
            --method POST \
            -f name="shellcheck" \
            -f head_sha="$NEW_SHA" \
            -f status="completed" \
            -f conclusion="success" \
            -f "output[title]=shellcheck passed" \
            -f "output[summary]=No issues found (carried from prior job result)"
          # changelog updated — report success for the new commit
          gh api "repos/$REPO/check-runs" \
            --method POST \
            -f name="changelog updated" \
            -f head_sha="$NEW_SHA" \
            -f status="completed" \
            -f conclusion="success" \
            -f "output[title]=CHANGELOG.md auto-updated" \
            -f "output[summary]=Changelog automatically updated and committed to the branch"
